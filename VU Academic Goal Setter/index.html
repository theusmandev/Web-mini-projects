<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VU Academic Goal Setter</title>
    <style>
        :root { --primary: #3b5998; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .calc-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #555; }
        .row { display: flex; gap: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #2d4373; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .success { background: #e7f4e4; color: #2e7d32; border: 1px solid #c8e6c9; }
        .warning { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>VU Academic Goal Setter</h2>
    
    <div class="input-group">
        <label>Sessional (Quizzes/GDB/Assignment) [20% Weight]</label>
        <div class="row">
            <input type="number" id="sessObt" placeholder="Obtained">
            <input type="number" id="sessTotal" placeholder="Total">
        </div>
    </div>

    <div class="input-group">
        <label>Midterm Marks [20% Weight]</label>
        <div class="row">
            <input type="number" id="midObt" placeholder="Obtained">
            <input type="number" id="midTotal" placeholder="Total">
        </div>
    </div>

    <div class="input-group">
        <label>Target Overall Percentage (%)</label>
        <input type="number" id="target" value="80">
    </div>

    <button onclick="calculate()">Calculate Required Final Marks</button>

    <div id="result"></div>
</div>

<script>
function calculate() {
    // Inputs
    const sessObt = parseFloat(document.getElementById('sessObt').value);
    const sessTotal = parseFloat(document.getElementById('sessTotal').value);
    const midObt = parseFloat(document.getElementById('midObt').value);
    const midTotal = parseFloat(document.getElementById('midTotal').value);
    const target = parseFloat(document.getElementById('target').value);
    const resultDiv = document.getElementById('result');

    if (isNaN(sessObt) || isNaN(sessTotal) || isNaN(midObt) || isNaN(midTotal)) {
        alert("Please fill all fields correctly!");
        return;
    }

    // Weighted Score Logic
    const currentSessWeight = (sessObt / sessTotal) * 20;
    const currentMidWeight = (midObt / midTotal) * 20;
    const currentTotalPoints = currentSessWeight + currentMidWeight;
    
    const pointsNeededFromFinal = target - currentTotalPoints;
    
    // Final is 60% weight, so points needed translates to marks
    // Assuming Final Paper is 60 marks total
    const requiredInFinal = pointsNeededFromFinal; 

    resultDiv.style.display = 'block';
    
    if (requiredInFinal > 60) {
        resultDiv.className = 'warning';
        resultDiv.innerHTML = `Target mushkil hai! Aapko 60 mein se ${requiredInFinal.toFixed(2)} marks chahiye, jo ke possible nahi.`;
    } else if (requiredInFinal <= 0) {
        resultDiv.className = 'success';
        resultDiv.innerHTML = `Mubarak ho! Aap pehle hi target achieve kar chuke hain.`;
    } else {
        resultDiv.className = 'success';
        resultDiv.innerHTML = `Target (${target}%) ke liye aapko Final Exam (60 Marks) mein kam az kam <b>${requiredInFinal.toFixed(2)}</b> marks chahiye.`;
    }
}
</script>

</body>
</html>
